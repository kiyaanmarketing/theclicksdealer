<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Click Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
    header { background: #1a1d2e; padding: 16px 32px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 20px; font-weight: 700; color: #fff; }
    header span { font-size: 12px; background: #6366f1; color: #fff; padding: 2px 10px; border-radius: 999px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }
    .filters { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; align-items: flex-end; }
    .filters label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 6px; }
    .filters input, .filters select { background: #1e2235; border: 1px solid #2d3148; color: #e2e8f0; padding: 8px 14px; border-radius: 8px; font-size: 14px; outline: none; }
    .filters input:focus, .filters select:focus { border-color: #6366f1; }
    .btn { background: #6366f1; color: #fff; border: none; padding: 9px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; }
    .btn:hover { background: #4f52d4; }
    .btn-outline { background: transparent; border: 1px solid #2d3148; color: #94a3b8; }
    .btn-outline:hover { border-color: #6366f1; color: #6366f1; }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .stat-card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; padding: 20px; }
    .stat-card .label { font-size: 12px; color: #94a3b8; margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: 700; color: #fff; }
    .stat-card .value.green { color: #22c55e; }
    .stat-card .value.red { color: #ef4444; }
    .card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #2d3148; display: flex; align-items: center; justify-content: space-between; }
    .card-header h2 { font-size: 15px; font-weight: 600; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #141624; color: #94a3b8; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 16px; text-align: left; }
    td { padding: 12px 16px; border-top: 1px solid #2d3148; font-size: 13px; }
    tr:hover td { background: #1e2235; }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge.success { background: #14532d; color: #22c55e; }
    .badge.failed { background: #450a0a; color: #ef4444; }
    .site-btn { color: #818cf8; cursor: pointer; text-decoration: underline; background: none; border: none; font-size: 13px; }
    .truncate { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .empty { text-align: center; color: #94a3b8; padding: 40px; font-size: 14px; }
    .loading { text-align: center; color: #94a3b8; padding: 40px; }
  </style>
</head>
<body>
  <header>
    <h1>Click Dashboard</h1>
    <span>TheClicksDealer</span>
  </header>

  <div class="container">
    <div class="filters">
      <div>
        <label>Date</label>
        <input type="date" id="dateFilter" />
      </div>
      <div>
        <label>Site</label>
        <input type="text" id="siteFilter" placeholder="e.g. www.fareastflora.com" style="width:240px" />
      </div>
      <div style="padding-top:18px; display:flex; gap:8px;">
        <button class="btn" onclick="loadStats()">Apply</button>
        <button class="btn btn-outline" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="label">Total Clicks</div>
        <div class="value" id="totalClicks">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Successful</div>
        <div class="value green" id="totalSuccess">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Failed</div>
        <div class="value red" id="totalFailed">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Active Sites</div>
        <div class="value" id="totalSites">—</div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Per Site Breakdown</h2>
      </div>
      <table>
        <thead>
          <tr>
            <th>Site</th>
            <th>Total Clicks</th>
            <th>Successful</th>
            <th>Failed</th>
            <th>Last Click</th>
          </tr>
        </thead>
        <tbody id="siteTable"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-header">
        <h2 id="detailTitle">Recent Clicks</h2>
        <button class="btn btn-outline" onclick="loadDetail()">Refresh</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Site</th>
            <th>Page URL</th>
            <th>Referrer</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="detailTable"><tr><td colspan="5" class="loading">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>

  <script>
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateFilter').value = today;

    function getFilters() {
      return {
        date: document.getElementById('dateFilter').value,
        site: document.getElementById('siteFilter').value.trim()
      };
    }

    function clearFilters() {
      document.getElementById('dateFilter').value = '';
      document.getElementById('siteFilter').value = '';
      loadStats();
      loadDetail();
    }

    function formatTime(ts) {
      const d = new Date(ts);
      return d.toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', hour12: false });
    }

    async function loadStats() {
      const { date, site } = getFilters();
      let url = '/api/click-stats?';
      if (date) url += 'date=' + date + '&';
      if (site) url += 'site=' + encodeURIComponent(site);

      document.getElementById('siteTable').innerHTML = '<tr><td colspan="5" class="loading">Loading...</td></tr>';

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (!data.success || !data.sites.length) {
          document.getElementById('totalClicks').textContent = 0;
          document.getElementById('totalSuccess').textContent = 0;
          document.getElementById('totalFailed').textContent = 0;
          document.getElementById('totalSites').textContent = 0;
          document.getElementById('siteTable').innerHTML = '<tr><td colspan="5" class="empty">No data found</td></tr>';
          return;
        }

        const totalSuccess = data.sites.reduce((a, s) => a + s.success, 0);
        const totalFailed = data.sites.reduce((a, s) => a + s.failed, 0);

        document.getElementById('totalClicks').textContent = data.total.toLocaleString();
        document.getElementById('totalSuccess').textContent = totalSuccess.toLocaleString();
        document.getElementById('totalFailed').textContent = totalFailed.toLocaleString();
        document.getElementById('totalSites').textContent = data.sites.length;

        document.getElementById('siteTable').innerHTML = data.sites.map(s => `
          <tr>
            <td><button class="site-btn" onclick="filterBySite('${s._id}')">${s._id || '—'}</button></td>
            <td>${s.total.toLocaleString()}</td>
            <td style="color:#22c55e">${s.success.toLocaleString()}</td>
            <td style="color:#ef4444">${s.failed.toLocaleString()}</td>
            <td style="color:#94a3b8">${s.lastClick ? formatTime(s.lastClick) : '—'}</td>
          </tr>
        `).join('');

        loadDetail();
      } catch (e) {
        document.getElementById('siteTable').innerHTML = '<tr><td colspan="5" class="empty">Error loading data</td></tr>';
      }
    }

    async function loadDetail() {
      const { date, site } = getFilters();
      let url = '/api/click-stats/detail?limit=50';
      if (date) url += '&date=' + date;
      if (site) url += '&site=' + encodeURIComponent(site);

      document.getElementById('detailTitle').textContent = site ? 'Recent Clicks — ' + site : 'Recent Clicks';
      document.getElementById('detailTable').innerHTML = '<tr><td colspan="5" class="loading">Loading...</td></tr>';

      try {
        const res = await fetch(url);
        const data = await res.json();

        if (!data.success || !data.logs.length) {
          document.getElementById('detailTable').innerHTML = '<tr><td colspan="5" class="empty">No clicks found</td></tr>';
          return;
        }

        document.getElementById('detailTable').innerHTML = data.logs.map(l => `
          <tr>
            <td style="color:#94a3b8;white-space:nowrap">${formatTime(l.timestamp)}</td>
            <td>${l.origin || '—'}</td>
            <td><span class="truncate" title="${l.url}">${l.url}</span></td>
            <td><span class="truncate" title="${l.referrer}">${l.referrer || '—'}</span></td>
            <td><span class="badge ${l.success ? 'success' : 'failed'}">${l.success ? 'Success' : 'Failed'}</span></td>
          </tr>
        `).join('');
      } catch (e) {
        document.getElementById('detailTable').innerHTML = '<tr><td colspan="5" class="empty">Error loading data</td></tr>';
      }
    }

    function filterBySite(site) {
      document.getElementById('siteFilter').value = site;
      loadStats();
      loadDetail();
    }

    loadStats();
  </script>
</body>
</html>
